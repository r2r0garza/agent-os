name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: agentic_os
          POSTGRES_PASSWORD: agentic_os
          POSTGRES_DB: agentic_os
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agentic_os"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: pnpm/action-setup@v4
        with:
          version: 10.28.0
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: frontend
      - run: pip install -e ".[dev]"
        working-directory: backend
      - run: python -m unittest discover -s backend/tests -v
        env:
          PYTHONPATH: backend/src
          AGENTIC_OS_DATABASE_URL: postgresql+psycopg://agentic_os:agentic_os@localhost:5432/agentic_os
      - run: pnpm typecheck
        working-directory: frontend
      - run: pnpm build
        working-directory: frontend
      - name: Check committed code index freshness
        run: ./agentic-os index check
